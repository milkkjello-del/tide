[meta]
name = "gruvbox"
slug = "gruvbox"
author = "tide"
version = 1
dark = true

[tokens]
bg          = "#282828"
bg_alt      = "#3c3836"
fg          = "#ebdbb2"
dim         = "#928374"
accent      = "#d79921"
sel_bg      = "#d79921"
sel_fg      = "#282828"
hover_bg    = "#3c3836"
hover_fg    = "#ebdbb2"
border_col  = "#504945"
border_dim  = "#3c3836"

[typography]
family  = "IBM Plex Mono"
size_pt = 10
weight  = 400
case    = "lower"
mono    = true

[layout]
radius_px       = 4
border_px       = 1
spacing_px      = 8
ambient_art     = false
control_style   = "bracket"
list_marker     = "> "
visualizer      = "bars-mono"
