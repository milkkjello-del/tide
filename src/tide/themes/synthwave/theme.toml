[meta]
name = "synthwave"
slug = "synthwave"
author = "tide"
version = 1
dark = true

[tokens]
bg          = "#1a103d"
bg_alt      = "#261a4a"
fg          = "#f0e8ff"
dim         = "#8c7eaf"
accent      = "#ff5dff"
accent_alt  = "#5dfdff"
sel_bg      = "#ff5dff"
sel_fg      = "#1a103d"
hover_bg    = "#322060"
hover_fg    = "#f0e8ff"
border_col  = "#ff5dff"
border_dim  = "#3a2670"

[typography]
family  = "IBM Plex Sans"
size_pt = 11
weight  = 500
case    = "leet"
